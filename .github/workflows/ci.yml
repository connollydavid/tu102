name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate CITATION.cff
        run: pipx run cffconvert --validate
      - name: project.py unit tests
        run: cd tools && python3 test_project.py
      - name: COVERAGE manifest vs table
        run: python3 tools/check_complete.py
      - name: Paper tables regenerate from the table CSV
        # figures are exempt: matplotlib version drift makes PDF/SVG bytes
        # non-deterministic across runners; tables are plain text
        run: |
          python3 tools/mk_paper_tables.py
          git diff --exit-code paper/tables
      - name: Lint table CSVs
        run: |
          python3 - <<'EOF'
          import csv, glob, sys
          ok = True
          for path in glob.glob('table/*.csv'):
              with open(path, newline='') as f:
                  rows = list(csv.reader(f))
              if not rows:
                  continue
              width = len(rows[0])
              for i, row in enumerate(rows[1:], start=2):
                  if len(row) != width:
                      print(f'{path}:{i}: {len(row)} cols, header has {width}')
                      ok = False
          sys.exit(0 if ok else 1)
          EOF

  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: paper
      - name: Assemble the bundle
        # self-describing, sha-stamped names: a downloaded file stays
        # traceable when detached from the zip. The bundle is the
        # release shape: paper as PDF and as the agent-readable mirror
        # (figure links rewritten to the bundled SVGs), the full table
        # with its codebook, and the citation record.
        id: bundle
        run: |
          stamp="$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          mkdir -p bundle/figures
          cp paper/main.pdf "bundle/tu102-paper-${stamp}.pdf"
          sed 's|paper/figures/|figures/|g' PAPER.md > "bundle/tu102-paper-${stamp}.md"
          cp paper/figures/*.svg bundle/figures/
          cp table/tu102_ops.csv "bundle/tu102-ops-${stamp}.csv"
          cp table/SCHEMA.md CITATION.cff bundle/
          echo "stamp=${stamp}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: tu102-${{ steps.bundle.outputs.stamp }}
          path: bundle/

  paper-md-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check PAPER.md is regenerated from main.tex
        run: |
          # pinned to the pandoc major.minor used locally — gfm output
          # drifts across pandoc versions and would false-fail the diff
          wget -q https://github.com/jgm/pandoc/releases/download/3.6/pandoc-3.6-1-amd64.deb
          sudo dpkg -i pandoc-3.6-1-amd64.deb
          make paper-md
          git diff --exit-code PAPER.md
